<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Simulator V2</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:800px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
  user-select:none;
  line-height:1.4;
  display:flex;
  flex-direction:column;
  gap:6px;
}

select{
  margin-top:5px;
  padding:5px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Simulator V2</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>
<button onclick="checkOrder()">Check Optimal</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order = [];
let selected = null;

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types = ["A320","A321","B738","E190","A388","C130","GLEX","C56X","EUROFIGHTER"];
const runways = ["06","24"];
const routes = ["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

const intersections = ["A1","A2","A3","A4","A6","A8","A9","B1","B2","B4","B5"];

// ------------------
// RANDOM
// ------------------
function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// ------------------
// WAKE
// ------------------
function wake(type){
  if(type==="A388") return "JUMBO";
  if(type==="C130") return "HEAVY";
  if(type==="A320"||type==="A321"||type==="B738") return "MEDIUM";
  return "LIGHT";
}

// ------------------
// MILITARY
// ------------------
function isMilitary(f){
  return f.type === "EUROFIGHTER" || f.type === "C130";
}

// ------------------
// DIRECTION
// ------------------
function direction(f){

  if(f.rwy === "24"){
    if(f.route === "NOKAR" || f.route === "MARIO") return "R";
    return "L";
  }

  if(f.rwy === "06"){
    if(f.route === "NOKAR") return "L";
    if(f.route === "MARIO") return "S";
    return "R";
  }

  return "S";
}

// ------------------
// INTERSECTION MODEL
// ------------------
function intersectionInfo(f){

  if(f.rwy === "06"){
    if(["A1","A2"].includes(f.intersection)) return {base:2,type:"STD"};
    if(["A3","A4","B1","B2"].includes(f.intersection)) return {base:3,type:"INT"};
  }

  if(f.rwy === "24"){
    if(["A8","A9","B5"].includes(f.intersection)) return {base:2,type:"STD"};
    if(["A6","B4"].includes(f.intersection)) return {base:3,type:"INT"};
  }

  return {base:2,type:"STD"};
}

// ------------------
// VALIDATION
// ------------------
function validIntersection(f){
  if(f.intersection.startsWith("B") && !isMilitary(f)){
    return false;
  }
  return true;
}

// ------------------
// INTERSECTION COST (PER FLIGHT)
// ------------------
function intersectionCost(f){
  const i = intersectionInfo(f);
  let c = i.base;
  if(i.type === "INT") c += 1;
  return c;
}

// ------------------
// MAIN COST
// ------------------
function cost(a,b){

  let c = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  const dirA = direction(a);
  const dirB = direction(b);

  // WAKE TURBULENCE
  if(B==="LIGHT" && (A==="MEDIUM"||A==="HEAVY"||A==="JUMBO")) c += 2;
  if(B==="MEDIUM" && A==="HEAVY") c += 2;
  if(B==="HEAVY" && A==="JUMBO") c += 2;
  if((B==="LIGHT"||B==="MEDIUM") && A==="JUMBO") c += 3;

  // DIRECTION RULES
  if(dirA === dirB && dirA !== "S") c += 2;
  if(dirA === "S") c += 2;
  if(dirB === "S") c += 2;

  // INTERSECTION
  c += intersectionCost(a);
  c += intersectionCost(b);

  // INVALID PENALTY
  if(!validIntersection(a)) c += 5;
  if(!validIntersection(b)) c += 5;

  return c;
}

// ------------------
// TOTAL COST
// ------------------
function totalCost(arr){
  let sum = 0;
  for(let i=0;i<arr.length-1;i++){
    sum += cost(arr[i], arr[i+1]);
  }
  return sum;
}

// ------------------
// GREEDY OPT
// ------------------
function greedyBest(arr){

  let remaining = [...arr];
  let result = [];

  let current = remaining.splice(0,1)[0];
  result.push(current);

  while(remaining.length > 0){

    let bestIndex = 0;
    let bestScore = 9999;

    for(let i=0;i<remaining.length;i++){
      let c = cost(current, remaining[i]);
      if(c < bestScore){
        bestScore = c;
        bestIndex = i;
      }
    }

    current = remaining.splice(bestIndex,1)[0];
    result.push(current);
  }

  return result;
}

// ------------------
// GENERATE
// ------------------
function generate(){

  order = [];
  selected = null;

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    order.push({
      id: rand(airlines) + Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy,
      route: rand(routes),
      intersection: "A1"
    });
  }

  render(order);
}

// ------------------
// RENDER
// ------------------
function render(data){

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((f,index)=>{

    const div = document.createElement("div");
    div.className = "strip";

    let valid = validIntersection(f);

    div.style.borderColor = valid ? "#444" : "red";

    div.innerHTML =
      "<b>" + f.id + "</b><br>" +
      "Type: " + f.type + " | Wake: " + wake(f.type) + "<br>" +
      "RWY: " + f.rwy + " | Route: " + f.route + "<br>" +
      "Intersection: " + f.intersection +
      (valid ? "" : "<br><span style='color:red'>INVALID (B restriction)</span>");

    // swap logic
    div.onclick = function(){

      if(selected === null){
        selected = index;
        div.classList.add("active");
      } else {

        let temp = order[selected];
        order[selected] = order[index];
        order[index] = temp;

        selected = null;
        render(order);
      }
    };

    // DROPDOWN
    const select = document.createElement("select");

    intersections.forEach(o=>{
      let opt = document.createElement("option");
      opt.value = o;
      opt.text = o;
      if(f.intersection === o) opt.selected = true;
      select.appendChild(opt);
    });

    select.onchange = function(e){
      order[index].intersection = e.target.value;
    };

    div.appendChild(select);

    list.appendChild(div);
  });
}

// ------------------
// EVALUATE
// ------------------
function evaluate(){

  if(order.length === 0){
    document.getElementById("result").innerText = "Press Generate first.";
    return;
  }

  let userCost = totalCost(order);
  let best = greedyBest([...order]);
  let bestCost = totalCost(best);

  let diff = userCost - bestCost;

  let rating = "GOOD";
  if(diff > 2) rating = "MID";
  if(diff > 5) rating = "BAD";

  document.getElementById("result").innerText =
`RESULT

Your cost: ${userCost}
Best cost: ${bestCost}
Difference: +${diff}

Rating: ${rating}`;
}

// ------------------
// CHECK
// ------------------
function checkOrder(){

  if(order.length === 0){
    document.getElementById("result").innerText = "Press Generate first.";
    return;
  }

  let best = greedyBest([...order]);

  document.getElementById("result").innerText =
`CHECK

Your cost: ${totalCost(order)}
Best cost: ${totalCost(best)}
Difference: ${totalCost(order) - totalCost(best)}`;
}

</script>

</body>
</html>
