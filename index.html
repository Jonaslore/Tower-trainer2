<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:700px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  user-select:none;
  cursor:pointer;
}

.strip.active{
  border-color:#f1c40f;
}

.good{ border-color:#2ecc71; }
.mid{ border-color:#f1c40f; }
.bad{ border-color:#e74c3c; }

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer – Wake & Runway</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let flights = [];
let order = [];
let selected = null;

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ"];
const types = ["A320","B738","A321","E190","A388","C130","GLEX","C56X"];
const runways = ["06","24"];

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

// WAKE CLASS
function wake(type){
  if(type==="A388") return "JUMBO";
  if(type==="C130") return "HEAVY";
  if(type==="A320"||type==="A321"||type==="B738") return "MEDIUM";
  return "LIGHT";
}

// COST
function cost(a,b){

  let c = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  if(B==="LIGHT" && (A==="MEDIUM"||A==="HEAVY"||A==="JUMBO")) c += 2;
  if(B==="MEDIUM" && A==="HEAVY") c += 2;
  if(B==="LIGHT" && A==="JUMBO") c += 3;

  if(a.rwy === b.rwy) c += 1;

  return c;
}

// TOTAL COST
function totalCost(arr){
  let sum = 0;
  for(let i=0;i<arr.length-1;i++){
    sum += cost(arr[i], arr[i+1]);
  }
  return sum;
}

// GENERATE
function generate(){

  flights = [];
  order = [];

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy
    });
  }

  order = [...flights];
  render();
}

// RENDER
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f, index)=>{

    const div = document.createElement("div");
    div.className = "strip";

    div.innerHTML = `
<b>${f.id}</b> – ${f.type}<br>
RWY: ${f.rwy} | WAKE: ${wake(f.type)}
`;

    div.onclick = () => {

      if(selected === null){
        selected = index;
        div.classList.add("active");
      } else {

        let temp = order[selected];
        order[selected] = order[index];
        order[index] = temp;

        selected = null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// EVALUATE (FIXED)
function evaluate(){

  let userCost = totalCost(order);

  let bestCost = 999999;
  let best = [];

  let remaining = [...order];

  let current = remaining.splice(0,1)[0];
  best.push(current);

  while(remaining.length > 0){

    let bestIndex = 0;
    let bestLocal = 999999;

    for(let i=0;i<remaining.length;i++){
      let c = cost(current, remaining[i]);
      if(c < bestLocal){
        bestLocal = c;
        bestIndex = i;
      }
    }

    current = remaining.splice(bestIndex,1)[0];
    best.push(current);
  }

  bestCost = totalCost(best);

  let diff = userCost - bestCost;

  let color = "good";
  if(diff > 2) color = "mid";
  if(diff > 5) color = "bad";

  document.querySelectorAll(".strip").forEach(el=>{
    el.classList.remove("good","mid","bad");
    el.classList.add(color);
  });

  document.getElementById("result").innerText =
`RESULT

Your score: ${userCost}
Best possible: ${bestCost}
Difference: +${diff}

(${color.toUpperCase()})`;
}

</script>

</body>
</html>
