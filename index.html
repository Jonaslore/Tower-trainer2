<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:700px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:10px;

  display:flex;
  flex-direction:column;   /* <<< FIX: alles untereinander */
  gap:4px;

  cursor:grab;
}

.strip:active{
  cursor:grabbing;
}

.row{
  display:block;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Departure Trainer</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let flights = [];

const types=["A320","B738","A321","E190","A388","EUROFIGHTER","GLEX","C56X"];
const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ"];

const runways=["06","24"];

function rand(a){return a[Math.floor(Math.random()*a.length)];}

function prk(){return "M"+(10+Math.floor(Math.random()*90));}

function hdg(){return Math.floor(Math.random()*360);}

function time(){
  let h=10+Math.floor(Math.random()*10);
  let m=Math.floor(Math.random()*60);
  return ""+h+(m<10?"0"+m:m);
}

function generate(){

  flights=[];

  let rwy=rand(runways);

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy:rwy,
      prk:prk(),
      hdg:hdg(),
      time:time()
    });
  }

  render();
}

function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  flights.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";
    div.draggable=true;
    div.dataset.index=i;

    div.innerHTML=`
<div>${f.type}  ALT:0  Loc:</div>
<div>${f.id}  HDG:${f.hdg}  Prk:${f.prk}</div>
<div>${f.time}  GS:0  RWY:${f.rwy}  A9</div>
`;

    div.addEventListener("dragstart",e=>{
      dragged=div;
    });

    div.addEventListener("dragover",e=>{
      e.preventDefault();
    });

    div.addEventListener("drop",e=>{
      e.preventDefault();

      const list=document.getElementById("list");

      if(dragged!==div){

        let nodes=[...list.children];
        let a=nodes.indexOf(dragged);
        let b=nodes.indexOf(div);

        if(a<b){
          list.insertBefore(dragged,div.nextSibling);
        }else{
          list.insertBefore(dragged,div);
        }
      }
    });

    list.appendChild(div);
  });
}

let dragged=null;

function evaluate(){

  const nodes=[...document.querySelectorAll(".strip")];

  const order=nodes.map(n=>n.innerText);

  document.getElementById("result").innerText=
`CHECK DONE

Flights sorted: ${order.length}

(Logic engine kommt als nächster Schritt)
`;
}

</script>

</body>
</html>
