<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V9 EXAM MODE</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}

.bad{ border-color:red !important; }
.warn{ border-color:orange !important; }
.good{ border-color:#444 !important; }
.best{ border-color:lime !important; }

select{
  margin-top:6px;
  padding:4px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V9 – EXAM MODE</h2>

<button onclick="generate()">Generate</button>
<button onclick="check()">Check Exam</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order=[];
let selected=null;

const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","C130"];
const runways=["06","24"];
const routes=["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

const intersections=["A1","A2","A3","A4","A6","A8","A9","B1","B2","B4","B5"];

function rand(a){return a[Math.floor(Math.random()*a.length)];}

// ---------------- WAKE ----------------
function wake(t){
  if(t==="A388") return "JUMBO";
  if(t==="C130") return "HEAVY";
  return "MEDIUM";
}

// ---------------- DIRECTION ----------------
function dir(f){
  if(f.rwy==="24"){
    if(f.route==="NOKAR"||f.route==="MARIO") return "R";
    return "L";
  }
  return "S";
}

// ---------------- MAX RULE COST ----------------
function cost(a,b){

  const A=wake(a.type);
  const B=wake(b.type);

  let wakeCost=0;
  if(B==="LIGHT" && A!=="LIGHT") wakeCost=1;
  if(B==="MEDIUM" && A==="HEAVY") wakeCost=2;
  if(B==="LIGHT" && A==="JUMBO") wakeCost=3;

  let routeCost = (a.route===b.route) ? 0 : 2;
  let dirCost = (dir(a)===dir(b) && dir(a)!=="S") ? 1 : 0;

  return Math.max(wakeCost, routeCost, dirCost);
}

// ---------------- TOTAL COST ----------------
function total(arr){
  let t=0;
  for(let i=0;i<arr.length-1;i++){
    t += cost(arr[i],arr[i+1]);
  }
  return t;
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy=rand(runways);

  for(let i=0;i<6;i++){
    order.push({
      id:rand(airlines)+Math.floor(Math.random()*900),
      type:rand(types),
      rwy,
      route:rand(routes),
      intersection:rand(intersections)
    });
  }

  render();
}

// ---------------- RENDER ----------------
function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let c="";

    if(i<order.length-1){
      let s=cost(order[i],order[i+1]);

      if(s>=3) c="bad";
      else if(s===2) c="warn";
      else c="good";
    }

    div.classList.add(c);

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "RWY: "+f.rwy+" | "+f.type+"<br>"+
      "Route: "+f.route;

    // 🔥 INTERSECTION SELECTOR
    const sel=document.createElement("select");

    intersections.forEach(x=>{
      let o=document.createElement("option");
      o.value=x;
      o.text=x;
      if(x===f.intersection)o.selected=true;
      sel.appendChild(o);
    });

    sel.onchange=e=>{
      order[i].intersection=e.target.value;
    };

    div.appendChild(sel);

    div.onclick=()=>{
      if(selected===null) selected=i;
      else{
        [order[selected],order[i]]=[order[i],order[selected]];
        selected=null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- CHECK (EXAM MODE) ----------------
function check(){

  let opt = optimal(order);

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let ok = order[i].id === opt[i].id;

    div.classList.add(ok ? "best" : "bad");

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "USER INT: "+f.intersection+"<br>"+
      "OPT INT: "+opt[i].intersection+"<br>"+
      "TYPE: "+f.type+" | RWY: "+f.rwy;

    list.appendChild(div);
  });

  const title=document.createElement("div");
  title.innerHTML="<h3>OPTIMAL SEQUENCE</h3>";
  list.appendChild(title);

  opt.forEach(f=>{
    const div=document.createElement("div");
    div.className="strip best";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      f.type+" | "+f.route+" | "+f.intersection;

    list.appendChild(div);
  });

  result.innerText =
`RESULT

Your cost: ${total(order)}
Optimal: ${total(opt)}
Difference: ${total(order)-total(opt)}`;

}

// ---------------- OPTIMAL SOLVER ----------------
function optimal(arr){

  let best=null;
  let bestScore=999999;

  function perm(a,cur=[]){
    if(a.length===0){
      let s=total(cur);
      if(s<bestScore){
        bestScore=s;
        best=cur;
      }
      return;
    }

    for(let i=0;i<a.length;i++){
      let copy=[...a];
      let item=copy.splice(i,1)[0];
      perm(copy,[...cur,item]);
    }
  }

  perm(arr);
  return best;
}

</script>

</body>
</html>
