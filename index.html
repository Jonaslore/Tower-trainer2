<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Simulator V3</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:850px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
  user-select:none;
  display:flex;
  flex-direction:column;
  gap:6px;
}

select{
  padding:5px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Simulator V3</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>
<button onclick="checkOrder()">Check Optimal</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order = [];
let selected = null;

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types = ["A320","A321","B738","E190","A388","C130","GLEX","C56X","EUROFIGHTER"];
const runways = ["06","24"];
const routes = ["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

const intersections = ["A1","A2","A3","A4","A6","A8","A9","B1","B2","B4","B5"];

function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// ---------------- WAKE ----------------
function wake(t){
  if(t==="A388") return "JUMBO";
  if(t==="C130") return "HEAVY";
  if(t==="A320"||t==="A321"||t==="B738") return "MEDIUM";
  return "LIGHT";
}

// ---------------- MILITARY ----------------
function isMilitary(f){
  return f.type==="EUROFIGHTER"||f.type==="C130";
}

// ---------------- DIRECTION ----------------
function direction(f){
  if(f.rwy==="24"){
    if(f.route==="NOKAR"||f.route==="MARIO") return "R";
    return "L";
  }
  if(f.rwy==="06"){
    if(f.route==="NOKAR") return "L";
    if(f.route==="MARIO") return "S";
    return "R";
  }
  return "S";
}

// ---------------- INTERSECTION ----------------
function intersectionInfo(f){
  if(f.rwy==="06"){
    if(["A1","A2"].includes(f.intersection)) return {base:1,type:"STD"};
    if(["A3","A4","B1","B2"].includes(f.intersection)) return {base:2,type:"INT"};
  }
  if(f.rwy==="24"){
    if(["A8","A9","B5"].includes(f.intersection)) return {base:1,type:"STD"};
    if(["A6","B4"].includes(f.intersection)) return {base:2,type:"INT"};
  }
  return {base:1,type:"STD"};
}

// ---------------- VALIDATION ----------------
function validIntersection(f){
  return !(f.intersection.startsWith("B") && !isMilitary(f));
}

// ---------------- COST (CLEAN + BALANCED) ----------------
function cost(a,b){

  let c = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  const dirA = direction(a);
  const dirB = direction(b);

  // WAKE (bounded)
  if(B==="LIGHT" && (A==="MEDIUM"||A==="HEAVY"||A==="JUMBO")) c += 1;
  if(B==="MEDIUM" && A==="HEAVY") c += 1;
  if(B==="HEAVY" && A==="JUMBO") c += 1;
  if((B==="LIGHT"||B==="MEDIUM") && A==="JUMBO") c += 2;

  // DIRECTION (small penalty)
  if(dirA === dirB && dirA !== "S") c += 1;
  if(dirA === "S") c += 1;
  if(dirB === "S") c += 1;

  // INTERSECTION (light influence ONLY)
  c += intersectionInfo(a).base;
  c += intersectionInfo(b).base;

  if(intersectionInfo(a).type==="INT") c += 0.5;
  if(intersectionInfo(b).type==="INT") c += 0.5;

  // invalid B restriction
  if(!validIntersection(a)) c += 2;
  if(!validIntersection(b)) c += 2;

  return c;
}

// ---------------- TOTAL ----------------
function totalCost(arr){
  let sum=0;
  for(let i=0;i<arr.length-1;i++){
    sum += cost(arr[i],arr[i+1]);
  }
  return sum;
}

// ---------------- GREEDY OPT ----------------
function greedyBest(arr){

  let rem=[...arr];
  let res=[];

  let cur=rem.splice(0,1)[0];
  res.push(cur);

  while(rem.length){
    let best=0,bestScore=9999;

    for(let i=0;i<rem.length;i++){
      let s=cost(cur,rem[i]);
      if(s<bestScore){
        bestScore=s;
        best=i;
      }
    }

    cur=rem.splice(best,1)[0];
    res.push(cur);
  }

  return res;
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy=rand(runways);

  for(let i=0;i<6;i++){
    order.push({
      id:rand(airlines)+Math.floor(Math.random()*900),
      type:rand(types),
      rwy,
      route:rand(routes),
      intersection:"A1"
    });
  }

  render(order);
}

// ---------------- RENDER ----------------
function render(data){

  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((f,index)=>{

    const div=document.createElement("div");
    div.className="strip";

    let valid=validIntersection(f);

    div.style.borderColor=valid?"#444":"red";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "RWY:"+f.rwy+" | Route:"+f.route+"<br>"+
      "INT:"+f.intersection+
      (valid?"":" <span style='color:red'>(INVALID)</span>");

    // swap
    div.onclick=function(){
      if(selected===null){
        selected=index;
        div.style.borderColor="yellow";
      }else{
        [order[selected],order[index]]=[order[index],order[selected]];
        selected=null;
        render(order);
      }
    };

    // dropdown
    const sel=document.createElement("select");
    intersections.forEach(o=>{
      let opt=document.createElement("option");
      opt.value=o;
      opt.text=o;
      if(f.intersection===o) opt.selected=true;
      sel.appendChild(opt);
    });

    sel.onchange=e=>{
      order[index].intersection=e.target.value;
    };

    div.appendChild(sel);
    list.appendChild(div);
  });
}

// ---------------- EVALUATE ----------------
function evaluate(){

  if(!order.length){
    result.innerText="Generate first.";
    return;
  }

  let a=totalCost(order);
  let b=totalCost(greedyBest([...order]));

  result.innerText=
`RESULT

Your cost: ${a.toFixed(2)}
Best cost: ${b.toFixed(2)}
Difference: ${(a-b).toFixed(2)}`;
}

// ---------------- CHECK (LOADING + VISUAL + OPT) ----------------
async function checkOrder(){

  if(!order.length){
    result.innerText="Generate first.";
    return;
  }

  result.innerText="Calculating...";

  await new Promise(r=>setTimeout(r,500));

  const best=greedyBest([...order]);

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let c=i<order.length-1?cost(order[i],order[i+1]):0;

    div.style.borderColor=validIntersection(f)?"lime":"red";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "INT:"+f.intersection+"<br>"+
      "Cost:"+c.toFixed(1);

    list.appendChild(div);
  });

  await new Promise(r=>setTimeout(r,300));

  const title=document.createElement("div");
  title.innerHTML="<h3>OPTIMAL SEQUENCE</h3>";
  list.appendChild(title);

  best.forEach(f=>{

    const div=document.createElement("div");
    div.className="strip";
    div.style.borderColor="cyan";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "INT:"+f.intersection;

    list.appendChild(div);
  });

  result.innerText=
`DONE

Your cost: ${totalCost(order).toFixed(2)}
Best cost: ${totalCost(best).toFixed(2)}`;
}

</script>

</body>
</html>
