<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V12 – FIXED</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}

select{
  margin-top:6px;
  padding:4px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V12 – FIXED</h2>

<button onclick="generate()">Generate</button>
<button onclick="check()">Check</button>

<div id="list"></div>
<div id="result" class="result"></div>

<script>

let order = [];
let selected = null;

const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","B747","C17","A400M","GLEX","C56X","EUROFIGHTER","SR22","C172","DA40","DA42"];
const runways=["06","24"];
const routes=["HAGAN","EGGIB","RONAL","NOKAR","MARIO"];

// ---------------- RANDOM ----------------
function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

// ---------------- WAKE ----------------
function wake(t){
  if(t==="A388") return "JUMBO";
  if(["B747","C17","A400M"].includes(t)) return "HEAVY";
  if(["SR22","C172","DA40","DA42"].includes(t)) return "LIGHT";
  return "MEDIUM";
}

// ---------------- DIRECTION ----------------
function dir(f){

  if(f.rwy==="24"){
    return (f.route==="NOKAR" || f.route==="MARIO") ? "R" : "L";
  }

  if(f.rwy==="06"){
    if(f.route==="NOKAR") return "L";
    if(f.route==="MARIO") return "S";
    return "R";
  }

  return "S";
}

// ---------------- INTERSECTIONS ----------------
function getAllowedIntersections(f){

  const military = ["EUROFIGHTER","C17","A400M"].includes(f.type);
  const b747 = f.type==="B747";

  if(f.rwy==="24"){
    if(military) return ["B5","B4"];
    if(b747) return ["A9","A8","A6","B5","B4"];
    return ["A9","A8","A6"];
  }

  if(f.rwy==="06"){
    if(military) return ["B1","B2"];
    if(b747) return ["A1","A2","A3","A4","B1","B2"];
    return ["A1","A2","A3","A4"];
  }

  return [];
}

// ---------------- COST ----------------
function cost(a,b){

  // WAKE
  let wakeCost = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  if(A==="JUMBO" && B==="HEAVY") wakeCost = 2;
  else if(A==="JUMBO" && B==="MEDIUM") wakeCost = 3;
  else if(A==="JUMBO" && B==="LIGHT") wakeCost = 3;

  else if(A==="HEAVY" && B==="MEDIUM") wakeCost = 2;
  else if(A==="HEAVY" && B==="LIGHT") wakeCost = 2;

  else if(A==="MEDIUM" && B==="LIGHT") wakeCost = 2;

  // ROUTE
  let routeCost = 0;

  if(dir(a) === dir(b)) routeCost = 2;

  if(a.rwy==="06" && a.route==="MARIO")
    routeCost = Math.max(routeCost,2);

  // FIX: ADDITION statt MAX
  const separationCost = wakeCost + routeCost;

  // INTERSECTION
  let intersectionCost = 0;

  if(["A6","B4","A3","A4"].includes(b.intersection)){
    intersectionCost = 1;
  }

  return separationCost + intersectionCost;
}

// ---------------- EVALUATION ----------------
function evaluateSequence(arr){

  let total = 0;

  for(let i=0;i<arr.length-1;i++){
    total += cost(arr[i], arr[i+1]);
  }

  return total;
}

// ---------------- OPTIMIZER ----------------
function optimize(arr){

  let best = [...arr];
  let bestCost = evaluateSequence(best);

  let improved = true;

  while(improved){
    improved = false;

    for(let i=0;i<best.length;i++){
      for(let j=i+1;j<best.length;j++){

        let copy = [...best];
        [copy[i],copy[j]] = [copy[j],copy[i]];

        let c = evaluateSequence(copy);

        if(c < bestCost){
          best = copy;
          bestCost = c;
          improved = true;
        }
      }
    }
  }

  return best;
}

// ---------------- TOTAL ----------------
function total(arr){
  return evaluateSequence(arr);
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy = rand(runways);

  for(let i=0;i<6;i++){

    let type = rand(types);
    let route = rand(routes);

    order.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: type,
      rwy: rwy,
      route: route,
      intersection: getAllowedIntersections({
        type: type,
        rwy: rwy,
        route: route
      })[0]
    });
  }

  render();
}

// ---------------- RENDER ----------------
function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    div.innerHTML=
  `<b>${f.id}</b><br>
  RWY: ${f.rwy} | ${f.type} | ${wake(f.type)}<br>
  Route: ${f.route}`;

    const sel=document.createElement("select");

    getAllowedIntersections(f).forEach(x=>{
      let o=document.createElement("option");
      o.value=x;
      o.text=x;
      if(x===f.intersection) o.selected=true;
      sel.appendChild(o);
    });

    sel.onchange=e=>{
      order[i].intersection = e.target.value;
      e.stopPropagation();
    };

    div.appendChild(sel);

    div.onclick=()=>{
      if(selected===null) selected=i;
      else{
        [order[selected],order[i]]=[order[i],order[selected]];
        selected=null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- CHECK ----------------
function check(){

  let opt = optimize([...order]);

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let ok = order[i].id === opt[i].id;
    div.style.borderColor = ok ? "lime" : "red";

    div.innerHTML=
      `<b>${f.id}</b><br>
      TYPE: ${f.type} | RWY: ${f.rwy}`;

    list.appendChild(div);
  });

  list.appendChild(document.createElement("h3")).innerText="OPTIMAL SEQUENCE";

  opt.forEach(f=>{
    let div=document.createElement("div");
    div.className="strip";
    div.innerHTML=`<b>${f.id}</b><br>${f.type} | ${f.route}`;
    list.appendChild(div);
  });

  document.getElementById("result").innerText =
`RESULT

Your cost: ${total(order)}
Optimal cost: ${total(opt)}
Difference: ${total(order)-total(opt)}`;
}

</script>

</body>
</html>
