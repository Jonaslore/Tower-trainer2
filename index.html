<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V11.1</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}

select{
  margin-top:6px;
  padding:4px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V11.1 – Instructor Mode</h2>

<button onclick="generate()">Generate</button>
<button onclick="check()">Check</button>

<div id="list"></div>
<div id="result" class="result"></div>

<script>

let order = [];
let selected = null;

const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","B747","C17","A400M","GLEX","C56X","EUROFIGHTER"];
const routes=["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];
const runways=["06","24"];

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

// ---------------- WAKE ----------------
function wake(t){
  if(t==="A388") return "JUMBO";
  if(["B747","C17","A400M"].includes(t)) return "HEAVY";
  return "MEDIUM";
}

// ---------------- DIRECTION ----------------
function dir(f){
  if(f.rwy==="24"){
    return (f.route==="NOKAR" || f.route==="MARIO") ? "R" : "L";
  }
  if(f.rwy==="06"){
    if(f.route==="NOKAR") return "L";
    if(f.route==="MARIO") return "S";
    return "R";
  }
  return "S";
}

// ---------------- INTERSECTION ----------------
function isIntersectionDeparture(f){
  if(f.rwy==="24"){
    return ["A6","B4"].includes(f.intersection);
  }
  if(f.rwy==="06"){
    return ["A3","A4","B1","B2"].includes(f.intersection);
  }
  return false;
}

// ---------------- COST ----------------
function cost(a,b){

  let wakeCost = 0;
  const A = wake(a.type);
  const B = wake(b.type);

  if(A==="HEAVY" && B==="MEDIUM") wakeCost = 2;
  if(A==="JUMBO" && B==="HEAVY") wakeCost = 2;
  if(A==="JUMBO" && B==="MEDIUM") wakeCost = 3;

  let routeCost = 0;

  if(dir(a) === dir(b)) routeCost = 2;

  if(a.rwy==="06" && a.route==="MARIO")
    routeCost = Math.max(routeCost,2);

  let base = Math.max(wakeCost, routeCost);

  let intersectionCost = 0;

  if(base > 0 && isIntersectionDeparture(b))
    intersectionCost = 1;

  return base + intersectionCost;
}

// ---------------- TOTAL ----------------
function total(arr){
  let t=0;
  for(let i=0;i<arr.length-1;i++){
    t += cost(arr[i],arr[i+1]);
  }
  return t;
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    let f = {
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy,
      route: rand(routes),
      intersection: ""
    };

    f.intersection = ["A1","A2","A3","A4","A6","A8","A9","B1","B2","B4","B5"][0];
    order.push(f);
  }

  render();
}

// ---------------- OPTIMIZE ----------------
function optimize(arr){

  let improved = true;

  while(improved){
    improved = false;

    for(let i=0;i<arr.length;i++){
      for(let j=i+1;j<arr.length;j++){

        let copy = [...arr];
        [copy[i],copy[j]] = [copy[j],copy[i]];

        if(total(copy) < total(arr)){
          arr = copy;
          improved = true;
        }
      }
    }
  }

  return arr;
}

// ---------------- PAIR ANALYSIS ----------------
function pairReport(arr){

  let lines = [];

  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){

      let a = arr[i];
      let b = arr[j];

      let delay = cost(a,b);

      if(delay > 0){
        let reasons = [];

        const A = wake(a.type);
        const B = wake(b.type);

        if(A==="HEAVY" && B==="MEDIUM") reasons.push("Wake H→M");
        if(A==="JUMBO" && B==="HEAVY") reasons.push("Wake J→H");
        if(A==="JUMBO" && B==="MEDIUM") reasons.push("Wake J→M");

        if(dir(a)===dir(b)) reasons.push("Same direction");

        if(a.rwy==="06" && a.route==="MARIO") reasons.push("MARIO rule");

        if(isIntersectionDeparture(b)) reasons.push("Intersection +1");

        lines.push(`${a.id} → ${b.id} = ${delay} min (${reasons.join(", ")})`);
      } else {
        lines.push(`${a.id} → ${b.id} = 0 min`);
      }
    }
  }

  return lines;
}

// ---------------- WHY OPTIMAL ----------------
function whyOptimal(user,opt){

  let lines=[];

  for(let i=0;i<user.length;i++){

    if(user[i].id !== opt[i].id){

      let uImpact=0;
      let oImpact=0;

      for(let j=0;j<user.length;j++){
        if(i!==j) uImpact += cost(user[i],user[j]);
      }

      for(let j=0;j<opt.length;j++){
        if(i!==j) oImpact += cost(opt[i],opt[j]);
      }

      lines.push(
`${user[i].id} → position replaced by ${opt[i].id}
Reason: reduces downstream separation conflicts
Saved impact: ${uImpact - oImpact} min`
      );
    }
  }

  if(lines.length===0) return ["Already optimal"];

  return lines;
}

// ---------------- RENDER ----------------
function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    div.innerHTML=
      `<b>${f.id}</b><br>
      RWY: ${f.rwy} | ${f.type} | ${wake(f.type)}<br>
      Route: ${f.route}`;

    div.onclick=()=>{
      if(selected===null) selected=i;
      else{
        [order[selected],order[i]]=[order[i],order[selected]];
        selected=null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- CHECK ----------------
function check(){

  let opt = optimize([...order]);

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let ok = order[i].id === opt[i].id;
    div.style.borderColor = ok ? "lime" : "red";

    div.innerHTML=
      `<b>${f.id}</b><br>
      USER INT: ${f.intersection}<br>
      OPT INT: ${opt[i].intersection}<br>
      TYPE: ${f.type} | RWY: ${f.rwy} | ${wake(f.type)}`;

    list.appendChild(div);
  });

  list.appendChild(document.createElement("h3")).innerText="OPTIMAL SEQUENCE";

  opt.forEach(f=>{
    let div=document.createElement("div");
    div.className="strip";
    div.innerHTML=`<b>${f.id}</b><br>${f.type} | ${f.route}`;
    list.appendChild(div);
  });

  document.getElementById("result").innerText =
`RESULT

Your cost: ${total(order)}
Optimal cost: ${total(opt)}
Difference: ${total(order)-total(opt)}

--- PAIR ANALYSIS ---
${pairReport(order).slice(0,12).join("\n")}

--- WHY OPTIMAL ---
${whyOptimal(order,opt).join("\n")}`;
}

</script>

</body>
</html>
