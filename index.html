<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:700px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;

  display:flex;
  flex-direction:column;

  cursor:grab;
  user-select:none;
}

.strip.dragging{
  opacity:0.4;
}

.result{
  margin-top:20px;
  white-space:pre-line;
  color:#ccc;
}
</style>
</head>

<body>

<h2>ATC Trainer</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let flights = [];
let order = [];

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ"];

const types = ["A320","B738","A321","E190","A388","C130","GLEX","C56X","EUROFIGHTER"];

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

function generate(){

  flights = [];
  order = [];

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types)
    });
  }

  order = [...flights];

  render();
}

function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f)=>{

    const div = document.createElement("div");
    div.className = "strip";
    div.draggable = true;

    div.dataset.id = f.id;

    div.innerHTML = `
<b>${f.id}</b>
${f.type}
`;

    div.addEventListener("dragstart", ()=>{
      div.classList.add("dragging");
    });

    div.addEventListener("dragend", ()=>{
      div.classList.remove("dragging");
    });

    div.addEventListener("dragover", e=>{
      e.preventDefault();
    });

    div.addEventListener("drop", e=>{
      e.preventDefault();

      const dragged = document.querySelector(".dragging");
      const list = document.getElementById("list");

      const nodes = [...list.children];

      const from = nodes.indexOf(dragged);
      const to = nodes.indexOf(div);

      order.splice(to,0,order.splice(from,1)[0]);

      render();
    });

    list.appendChild(div);
  });
}

function evaluate(){

  const ids = order.map(f => f.id);

  document.getElementById("result").innerText =
`RESULT

Order:
${ids.join(" → ")}`;
}

</script>

</body>
</html>
