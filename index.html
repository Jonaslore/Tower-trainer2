<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Reset</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  padding:10px;
  margin:5px 0;
  cursor:pointer;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC RESET VERSION</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order = [];
let selected = null;

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ"];

// random helper
function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// GENERATE
function generate(){

  order = [];
  selected = null;

  for(let i=0;i<6;i++){
    order.push({
      id: rand(airlines) + Math.floor(Math.random()*900)
    });
  }

  render();
}

// RENDER
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f,index)=>{

    const div = document.createElement("div");
    div.className = "strip";
    div.innerText = f.id;

    div.onclick = function(){

      if(selected === null){
        selected = index;
      } else {

        let temp = order[selected];
        order[selected] = order[index];
        order[index] = temp;

        selected = null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// EVALUATE (100% TESTED SAFE)
function evaluate(){

  alert("EVALUATE WORKS");

  const result = document.getElementById("result");

  if(order.length === 0){
    result.innerText = "Press Generate first.";
    return;
  }

  let text = "RESULT\n\n";

  for(let i=0;i<order.length;i++){
    text += (i+1) + ". " + order[i].id + "\n";
  }

  result.innerText = text;
}

</script>

</body>
</html>
