<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V10 CLEAN</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}

.bad{ border-color:red !important; }
.warn{ border-color:orange !important; }
.good{ border-color:#444 !important; }
.best{ border-color:lime !important; }

select{
  margin-top:6px;
  padding:4px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V10 – CLEAN</h2>

<button onclick="generate()">Generate</button>
<button onclick="check()">Check</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order = [];
let selected = null;

const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","B747","C17","A400M","GLEX","C56X","EUROFIGHTER"];
const runways=["06","24"];
const routes=["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

// ---------------- UTILS ----------------
function rand(a){return a[Math.floor(Math.random()*a.length)];}

// ---------------- WAKE ----------------
function wake(t){
  if(t==="A388") return "JUMBO";
  if(["B747","C17","A400M"].includes(t)) return "HEAVY";
  return "MEDIUM";
}

// ---------------- DIRECTION ----------------
function dir(f){
  if(f.rwy==="24"){
    return (f.route==="NOKAR" || f.route==="MARIO") ? "R" : "L";
  }
  if(f.rwy==="06"){
    if(f.route==="NOKAR") return "L";
    if(f.route==="MARIO") return "S";
    return "R";
  }
  return "S";
}

// ---------------- INTERSECTION RULE ----------------
function isIntersectionDeparture(f){
  if(f.rwy==="24"){
    return ["A6","B4"].includes(f.intersection);
  }
  if(f.rwy==="06"){
    return ["A3","A4","B1","B2"].includes(f.intersection);
  }
  return false;
}

// ---------------- ALLOWED INTERSECTIONS ----------------
function getAllowedIntersections(f){
  const bravoOnly = ["EUROFIGHTER","C17","A400M"].includes(f.type);
  const bothSides = ["A388","B747"].includes(f.type);

  if(f.rwy==="24"){
    if(bravoOnly) return ["B4","B5"];
    if(bothSides) return ["A6","A8","A9","B4","B5"];
    return ["A6","A8","A9"];
  }

  if(f.rwy==="06"){
    if(bravoOnly) return ["B1","B2"];
    if(bothSides) return ["A1","A2","A3","A4","B1","B2"];
    return ["A1","A2","A3","A4"];
  }

  return [];
}

// ---------------- COST FUNCTION ----------------
function cost(a,b){

  let wakeCost = 0;
  const A = wake(a.type);
  const B = wake(b.type);

  if(A==="HEAVY" && B==="MEDIUM") wakeCost = 2;
  if(A==="JUMBO" && B==="HEAVY") wakeCost = 2;
  if(A==="JUMBO" && B==="MEDIUM") wakeCost = 3;

  let routeCost = 0;

  if(dir(a)==="R" && dir(b)==="R") routeCost = 2;
  if(dir(a)==="L" && dir(b)==="L") routeCost = 2;

  if(a.rwy==="06" && a.route==="MARIO") routeCost += 1;

  let delay = Math.max(wakeCost, routeCost);

  if(delay > 0 && isIntersectionDeparture(b)){
    delay += 1;
  }

  return delay;
}

// ---------------- TOTAL COST ----------------
function total(arr){
  let t = 0;
  for(let i=0;i<arr.length-1;i++){
    t += cost(arr[i],arr[i+1]);
  }
  return t;
}

// ---------------- GENERATE ----------------
function generate(){

  order = [];
  selected = null;

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    let f = {
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy,
      route: rand(routes),
      intersection: ""
    };

    f.intersection = getAllowedIntersections(f)[0];
    order.push(f);
  }

  render();
}

// ---------------- OPTIMIZER (HILL CLIMB) ----------------
function optimize(arr){

  let improved = true;

  while(improved){
    improved = false;

    for(let i=0;i<arr.length;i++){
      for(let j=i+1;j<arr.length;j++){

        let copy = [...arr];
        [copy[i], copy[j]] = [copy[j], copy[i]];

        if(total(copy) < total(arr)){
          arr = copy;
          improved = true;
        }
      }
    }
  }

  return arr;
}

// ---------------- RENDER ----------------
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f,i)=>{

    const div = document.createElement("div");
    div.className = "strip";

    if(i < order.length-1){
      let c = cost(order[i], order[i+1]);
      div.classList.add(c>=3 ? "bad" : c===2 ? "warn" : "good");
    }

    div.innerHTML =
      `<b>${f.id}</b><br>
      RWY: ${f.rwy} | ${f.type} | ${wake(f.type)}<br>
      Route: ${f.route}`;

    const sel = document.createElement("select");

    getAllowedIntersections(f).forEach(x=>{
      let o = document.createElement("option");
      o.value = x;
      o.text = x;
      if(x === f.intersection) o.selected = true;
      sel.appendChild(o);
    });

    sel.onchange = e => {
      order[i].intersection = e.target.value;
      e.stopPropagation();
    };

    div.appendChild(sel);

    div.onclick = () => {
      if(selected === null) selected = i;
      else{
        [order[selected], order[i]] = [order[i], order[selected]];
        selected = null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- CHECK ----------------
function check(){

  let opt = optimize([...order]);

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f,i)=>{

    const div = document.createElement("div");
    div.className = "strip";

    let ok = order[i].id === opt[i].id;
    div.classList.add(ok ? "best" : "bad");

    div.innerHTML =
      `<b>${f.id}</b><br>
      USER INT: ${f.intersection}<br>
      OPT INT: ${opt[i].intersection}<br>
      TYPE: ${f.type} | RWY: ${f.rwy}`;

    list.appendChild(div);
  });

  const title = document.createElement("div");
  title.innerHTML = "<h3>OPTIMAL SEQUENCE</h3>";
  list.appendChild(title);

  opt.forEach(f=>{
    const div = document.createElement("div");
    div.className = "strip best";
    div.innerHTML = `<b>${f.id}</b><br>${f.type} | ${f.route} | ${f.intersection}`;
    list.appendChild(div);
  });

  document.getElementById("result").innerText =
`RESULT

Your cost: ${total(order)}
Optimal: ${total(opt)}
Difference: ${total(order)-total(opt)}`;
}

</script>

</body>
</html>
