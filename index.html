<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:700px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  user-select:none;
  cursor:pointer;
}

.strip.active{
  border-color:#f1c40f;
}

.good{ border-color:#2ecc71; }
.mid{ border-color:#f1c40f; }
.bad{ border-color:#e74c3c; }

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer – Wake & Runway</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let flights = [];
let order = [];

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ"];
const types = ["A320","B738","A321","E190","A388","C130","GLEX","C56X"];

const runways = ["06","24"];

let selected = null;

// WAKE CLASS
function wake(type){
  if(type==="A388") return "JUMBO";
  if(type==="C130") return "HEAVY";
  if(type==="A320"||type==="A321"||type==="B738") return "MEDIUM";
  return "LIGHT";
}

// COST FUNCTION (ATC simplified)
function cost(a,b){

  let c = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  // Wake rules
  if(B==="LIGHT" && (A==="MEDIUM"||A==="HEAVY"||A==="JUMBO")) c += 2;
  if(B==="MEDIUM" && A==="HEAVY") c += 2;
  if(B==="LIGHT" && A==="JUMBO") c += 3;

  // runway pressure (same runway = more restriction)
  if(a.rwy === b.rwy) c += 1;

  return c;
}

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

function generate(){

  flights = [];
  order = [];

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy
    });
  }

  order = [...flights];
  render();
}

function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f, index)=>{

    const div = document.createElement("div");
    div.className = "strip";

    div.innerHTML = `
<b>${f.id}</b> – ${f.type}<br>
RWY: ${f.rwy} | WAKE: ${wake(f.type)}
`;

    div.onclick = () => {

      if(selected === null){
        selected = index;
        div.classList.add("active");
      } else {

        let temp = order[selected];
        order[selected] = order[index];
        order[index] = temp;

        selected = null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// OPTIMAL CALC
function totalCost(arr){
  let sum = 0;
  for(let i=0;i<arr.length-1;i++){
    sum += cost(arr[i], arr[i+1]);
  }
  return sum;
}

function evaluate(){

  let userCost = totalCost(order);

  // brute optimal (small dataset)
  let perms = permute(order);

  let best = perms[0];
  let bestCost = totalCost(best);

  for(let p of perms){
    let c = totalCost(p);
    if(c < bestCost){
      bestCost = c;
      best = p;
    }
  }

  let diff = userCost - bestCost;

  let color = "good";
  if(diff > 2) color = "mid";
  if(diff > 5) color = "bad";

  const list = document.querySelectorAll(".strip");

  list.forEach(el=>{
    el.classList.remove("good","mid","bad");
    el.classList.add(color);
  });

  document.getElementById("result").innerText =
`RESULT

Your delay score: ${userCost}
Best possible: ${bestCost}
Difference: +${diff}

(${color.toUpperCase()})`;
}

// small permutation generator (6 items only)
function permute(arr){
  if(arr.length <=1) return [arr];
  let res = [];

  for(let i=0;i<arr.length;i++){
    let rest = arr.slice(0,i).concat(arr.slice(i+1));
    for(let p of permute(rest)){
      res.push([arr[i],...p]);
    }
  }
  return res;
}

</script>

</body>
</html>
