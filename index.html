<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:700px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  user-select:none;
  cursor:pointer;
}

.strip.active{
  border-color:#f1c40f;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer (iPad Safe Mode)</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let flights = [];
let order = [];

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ"];
const types = ["A320","B738","A321","E190","A388","C130","GLEX","C56X"];

let selected = null;

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

function generate(){

  flights = [];
  order = [];

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types)
    });
  }

  order = [...flights];
  render();
}

function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f, index)=>{

    const div = document.createElement("div");
    div.className = "strip";

    div.innerHTML = `<b>${f.id}</b><br>${f.type}`;

    div.onclick = () => {

      if(selected === null){
        selected = index;
        div.classList.add("active");
      } else {

        // swap
        let temp = order[selected];
        order[selected] = order[index];
        order[index] = temp;

        selected = null;
        render();
      }
    };

    list.appendChild(div);
  });
}

function evaluate(){

  const ids = order.map(f => f.id);

  document.getElementById("result").innerText =
`RESULT

Order:
${ids.join(" → ")}`;
}

</script>

</body>
</html>
