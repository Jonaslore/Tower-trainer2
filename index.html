<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Simulator ALL-IN</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:750px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
  user-select:none;
}

.strip.active{
  border-color:#f1c40f;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Simulator ALL-IN</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>

<div class="result" id="result"></div>

<script>

let flights = [];
let order = [];
let selected = null;

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];

const types = ["A320","A321","B738","E190","A388","C130","GLEX","C56X","EUROFIGHTER"];

const runways = ["06","24"];

const routes = ["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

// RANDOM
function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

// WAKE
function wake(type){
  if(type==="A388") return "JUMBO";
  if(type==="C130") return "HEAVY";
  if(type==="A320"||type==="A321"||type==="B738") return "MEDIUM";
  return "LIGHT";
}

// GENERATE
function generate(){

  flights = [];
  order = [];
  selected = null;

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy,
      route: rand(routes)
    });
  }

  order = [...flights];
  render();
}

// RENDER
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f,index)=>{

    const div = document.createElement("div");
    div.className = "strip";

    div.innerHTML = `
<b>${f.id}</b> – ${f.type}<br>
RWY: ${f.rwy} | WAKE: ${wake(f.type)} | ROUTE: ${f.route}
`;

    div.onclick = ()=>{

      if(selected === null){
        selected = index;
        div.classList.add("active");
      } else {

        let temp = order[selected];
        order[selected] = order[index];
        order[index] = temp;

        selected = null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// COST MODEL
function cost(a,b){

  let c = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  // WAKE
  if(B==="LIGHT" && (A==="MEDIUM"||A==="HEAVY"||A==="JUMBO")) c += 2;
  if(B==="MEDIUM" && A==="HEAVY") c += 2;
  if(B==="LIGHT" && A==="JUMBO") c += 3;

  // RUNWAY
  if(a.rwy === b.rwy) c += 1;

  // ROUTE
  if(a.route === b.route) c += 1;

  return c;
}

// TOTAL
function totalCost(arr){
  let sum = 0;
  for(let i=0;i<arr.length-1;i++){
    sum += cost(arr[i], arr[i+1]);
  }
  return sum;
}

// GREEDY BEST
function greedyBest(arr){

  let remaining = [...arr];
  let result = [];

  let current = remaining.splice(0,1)[0];
  result.push(current);

  while(remaining.length > 0){

    let bestIndex = 0;
    let bestScore = 9999;

    for(let i=0;i<remaining.length;i++){
      let c = cost(current, remaining[i]);
      if(c < bestScore){
        bestScore = c;
        bestIndex = i;
      }
    }

    current = remaining.splice(bestIndex,1)[0];
    result.push(current);
  }

  return result;
}

// EVALUATE
// EVALUATE
function evaluate(){

  console.log("EVALUATE CLICKED", order);

  if(!order || order.length === 0){
    document.getElementById("result").innerText =
      "ERROR: No flights found. Please press Generate.";
    return;
  }

  let userCost = totalCost(order);

  let best = greedyBest([...order]);
  let bestCost = totalCost(best);

  let diff = userCost - bestCost;

  let rating = "GOOD";
  if(diff > 2) rating = "MID";
  if(diff > 5) rating = "BAD";

  document.getElementById("result").innerText =
`RESULT

Flights: ${order.length}

Your cost: ${userCost}
Best cost: ${bestCost}
Difference: +${diff}

Rating: ${rating}`;
}
</script>
</body>
</html>
