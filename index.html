<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V8 LIVE MODE</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
  cursor:pointer;
}

select{
  padding:5px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.bad{
  border-color:red !important;
}

.good{
  border-color:#444 !important;
}

.best{
  border-color:lime !important;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V8 – LIVE MODE</h2>

<button onclick="generate()">Generate</button>
<button onclick="check()">Check Optimal</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order=[];
let selected=null;

const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","C130"];
const runways=["06","24"];
const routes=["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

const intersections=["A1","A2","A3","A4","A6","A8","A9","B1","B2","B4","B5"];

function rand(a){return a[Math.floor(Math.random()*a.length)];}

function wake(t){
  if(t==="A388") return "JUMBO";
  if(t==="C130") return "HEAVY";
  return "MEDIUM";
}

function dir(f){
  if(f.rwy==="24"){
    if(f.route==="NOKAR"||f.route==="MARIO") return "R";
    return "L";
  }
  return "S";
}

// 🔥 MAX RULE COST
function cost(a,b){

  const A=wake(a.type);
  const B=wake(b.type);

  let wakeCost=0;
  if(B==="LIGHT" && A!=="LIGHT") wakeCost=1;
  if(B==="MEDIUM" && A==="HEAVY") wakeCost=2;
  if(B==="LIGHT" && A==="JUMBO") wakeCost=3;

  let routeCost = (a.route===b.route) ? 0 : 2;
  let dirCost = (dir(a)===dir(b) && dir(a)!=="S") ? 1 : 0;

  return Math.max(wakeCost, routeCost, dirCost);
}

function total(arr){
  let t=0;
  for(let i=0;i<arr.length-1;i++){
    t += cost(arr[i],arr[i+1]);
  }
  return t;
}

// ---------------- LIVE SCORE CALC ----------------
function pairScore(a,b){
  return cost(a,b);
}

// ---------------- SWAP SUGGESTION ----------------
function suggestSwap(i){

  let best=i;
  let bestScore=pairScore(order[i],order[i+1]);

  for(let j=0;j<order.length;j++){
    if(j===i||j===i+1) continue;

    let temp=[...order];
    [temp[i],temp[j]]=[temp[j],temp[i]];

    let s=0;
    for(let k=0;k<temp.length-1;k++){
      s+=cost(temp[k],temp[k+1]);
    }

    if(s<total(order)){
      return "Swap "+order[i].id+" with "+order[j].id;
    }
  }

  return "";
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy=rand(runways);

  for(let i=0;i<6;i++){
    order.push({
      id:rand(airlines)+Math.floor(Math.random()*900),
      type:rand(types),
      rwy,
      route:rand(routes),
      intersection:rand(intersections)
    });
  }

  render();
}

// ---------------- RENDER (LIVE MODE) ----------------
function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let score="";
    if(i<order.length-1){
      score="Next cost: "+cost(order[i],order[i+1]);
    }

    let suggestion = suggestSwap(i);

    if(i<order.length-1 && cost(order[i],order[i+1])>=2){
      div.classList.add("bad");
    }

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "RWY: "+f.rwy+" | "+f.type+"<br>"+
      "Route: "+f.route+"<br>"+
      score+
      (suggestion ? "<br><span style='color:yellow'>"+suggestion+"</span>" : "");

    div.onclick=()=>{
      if(selected===null) selected=i;
      else{
        [order[selected],order[i]]=[order[i],order[selected]];
        selected=null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- CHECK OPTIMAL ----------------
function check(){

  let opt = optimal(order);

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let ok = order[i].id === opt[i].id;

    div.classList.add(ok ? "best" : "bad");

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "USER INT: "+f.intersection+"<br>"+
      "OPT: "+opt[i].intersection;

    list.appendChild(div);
  });

  const title=document.createElement("div");
  title.innerHTML="<h3>OPTIMAL FLOW</h3>";
  list.appendChild(title);

  opt.forEach(f=>{
    const div=document.createElement("div");
    div.className="strip best";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      f.type+" | "+f.route;

    list.appendChild(div);
  });

  result.innerText =
`TOTAL COST
User: ${total(order)}
Optimal: ${total(opt)}
Diff: ${total(order)-total(opt)}`;

}

</script>

</body>
</html>
