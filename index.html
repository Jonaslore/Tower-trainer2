<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V11 FINAL</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}

select{
  margin-top:6px;
  padding:4px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V11 – FINAL</h2>

<button onclick="generate()">Generate</button>
<button onclick="check()">Check</button>

<div id="list"></div>
<div id="result" class="result"></div>

<script>

let order = [];
let selected = null;

const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","B747","C17","A400M","GLEX","C56X","EUROFIGHTER","SR22","C172","DA40","DA42"];
const runways=["06","24"];
const routes=["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

// ---------------- WAKE ----------------
function wake(t){

  if(t==="A388") return "JUMBO";
  if(["B747","C17","A400M"].includes(t)) return "HEAVY";
  if(["SR22","C172","DA40","DA42"].includes(t)) return "LIGHT";
  return "MEDIUM";
}

// ---------------- PRIORITY ----------------
function rank(type){

  if(["SR22","C172","DA40","DA42"].includes(type)) return 0;
  if(["E190","A320","A321","B738","GLEX","C56X"].includes(type)) return 1;
  if(["B747","C17","A400M"].includes(type)) return 2;
  if(type==="A388") return 3;

  return 1;
}

// ---------------- FLOW GROUP ----------------
function routeGroup(f){

  if(f.rwy === "24"){

    if(f.route === "EGGIB") return 0;
    if(f.route === "RONAL") return 0;
    if(f.route === "NOKAR") return 1;
    if(f.route === "MARIO") return 1;

    return 1;
  }

  if(f.rwy === "06"){

    if(f.route === "EGGIB") return 1;
    if(f.route === "RONAL") return 1;
    if(f.route === "NOKAR") return 2;
    if(f.route === "MARIO") return 3;

    return 1;
  }

  return 1;
}

// ---------------- DIRECTION ----------------
function dir(f){
  if(f.rwy==="24"){
    return (f.route==="NOKAR" || f.route==="MARIO") ? "R" : "L";
  }
  if(f.rwy==="06"){
    if(f.route==="NOKAR") return "L";
    if(f.route==="MARIO") return "S";
    return "R";
  }
  return "S";
}

// ---------------- INTERSECTIONS ----------------
function getAllowedIntersections(f){

  const military =
    ["EUROFIGHTER","C17","A400M"].includes(f.type);

  const b747 = f.type==="B747";

  if(f.rwy==="24"){

    if(military) return ["B5","B4"];
    if(b747) return ["A9","A8","A6","B5","B4"];
    return ["A9","A8","A6"];
  }

  if(f.rwy==="06"){

    if(military) return ["B1","B2"];
    if(b747) return ["A1","A2","A3","A4","B1","B2"];
    return ["A1","A2","A3","A4"];
  }

  return [];
}

// ---------------- INTERSECTION RULE ----------------
function isIntersectionDeparture(f){

  if(f.rwy==="24"){
    return ["A6","B4"].includes(f.intersection);
  }

  if(f.rwy==="06"){
    return ["A3","A4"].includes(f.intersection);
  }

  return false;
}

// ---------------- COST (PAIRWISE CORE) ----------------
function cost(a,b){

  let wakeCost = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  if(A==="JUMBO" && B==="HEAVY") wakeCost = 2;
  else if(A==="JUMBO" && B==="MEDIUM") wakeCost = 3;
  else if(A==="JUMBO" && B==="LIGHT") wakeCost = 3;

  else if(A==="HEAVY" && B==="MEDIUM") wakeCost = 2;
  else if(A==="HEAVY" && B==="LIGHT") wakeCost = 2;

  else if(A==="MEDIUM" && B==="LIGHT") wakeCost = 0;

  else if(A==="LIGHT" && B==="MEDIUM") wakeCost = 2;
  else if(A==="LIGHT" && B==="HEAVY") wakeCost = 2;
  else if(A==="LIGHT" && B==="JUMBO") wakeCost = 3;

  let routeCost = 0;

  if(dir(a) === dir(b)) routeCost = 2;

  if(a.rwy==="06" && a.route==="MARIO")
    routeCost = Math.max(routeCost,2);

  let base = Math.max(wakeCost, routeCost);

  let intersectionCost = 0;

  if(isIntersectionDeparture(b)){
    intersectionCost = 1;

    if(wake(b.type)==="LIGHT" && base>0){
      intersectionCost = 2;
    }

    if(base===0){
      intersectionCost = 0;
    }
  }

  return base + intersectionCost;
}

// ---------------- GLOBAL SEQUENCE EVALUATION (LEVEL 2 CORE) ----------------
function evaluateSequence(arr){

  let totalCost = 0;

  // pairwise cost
  for(let i=0;i<arr.length-1;i++){
    totalCost += cost(arr[i],arr[i+1]);
  }

  // smooth flow penalty
  for(let i=0;i<arr.length-2;i++){

    const a = arr[i];
    const b = arr[i+1];
    const c = arr[i+2];

    const gA = routeGroup(a);
    const gB = routeGroup(b);
    const gC = routeGroup(c);

    if(gA > gB && gB < gC){
      totalCost += 2;
    }
  }

  return totalCost;
}

// ---------------- OPTIMIZER (LEVEL 2) ----------------
function optimize(arr){

  let improved = true;

  while(improved){
    improved = false;

    for(let i=0;i<arr.length;i++){
      for(let j=i+1;j<arr.length;j++){

        let copy = [...arr];
        [copy[i],copy[j]] = [copy[j],copy[i]];

        if(evaluateSequence(copy) < evaluateSequence(arr)){
          arr = copy;
          improved = true;
        }
      }
    }
  }

  return arr;
}

// ---------------- TOTAL ----------------
function total(arr){
  return evaluateSequence(arr);
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    order.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy,
      route: rand(routes),
      intersection: getAllowedIntersections({type: rand(types), rwy: rwy, route: rand(routes)})[0]
    });
  }

  render();
}

// ---------------- RENDER ----------------
function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    div.innerHTML=
      `<b>${f.id}</b><br>
      RWY: ${f.rwy} | ${f.type} | ${wake(f.type)}<br>
      Route: ${f.route}`;

    const sel=document.createElement("select");

    getAllowedIntersections(f).forEach(x=>{
      let o=document.createElement("option");
      o.value=x;
      o.text=x;
      if(x===f.intersection) o.selected=true;
      sel.appendChild(o);
    });

    sel.onchange=e=>{
      order[i].intersection = e.target.value;
      e.stopPropagation();
    };

    div.appendChild(sel);

    div.onclick=()=>{
      if(selected===null) selected=i;
      else{
        [order[selected],order[i]]=[order[i],order[selected]];
        selected=null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- CHECK ----------------
function check(){

  let opt = optimize([...order]);

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let ok = order[i].id === opt[i].id;
    div.style.borderColor = ok ? "lime" : "red";

    div.innerHTML=
      `<b>${f.id}</b><br>
      TYPE: ${f.type} | RWY: ${f.rwy} | ${wake(f.type)}`;

    list.appendChild(div);
  });

  list.appendChild(document.createElement("h3")).innerText="OPTIMAL SEQUENCE";

  opt.forEach(f=>{
    let div=document.createElement("div");
    div.className="strip";
    div.innerHTML=`<b>${f.id}</b><br>${f.type} | ${f.route}`;
    list.appendChild(div);
  });

  document.getElementById("result").innerText =
`RESULT

Your cost: ${total(order)}
Optimal cost: ${total(opt)}
Difference: ${total(order)-total(opt)}`;
}

</script>

</body>
</html>
