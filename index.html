<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Real Mode V5</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

select{
  padding:5px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V5 – REAL MODE</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>
<button onclick="check()">Check Optimal</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order=[];
let selected=null;

// ---------------- DATA ----------------
const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","C130","GLEX","C56X","EUROFIGHTER"];
const runways=["06","24"];

const routes=["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

// HARD RULE: ONLY VALID INTERSECTIONS
const validMap={
  "06":["A1","A2","A3","A4","B1","B2","A6","B4"],
  "24":["A8","A9","B5","A6","B4"]
};

// ---------------- RANDOM ----------------
function rand(a){return a[Math.floor(Math.random()*a.length)];}

// ---------------- CLASS ----------------
function wake(t){
  if(t==="A388")return "JUMBO";
  if(t==="C130")return "HEAVY";
  if(["A320","A321","B738"].includes(t))return "MEDIUM";
  return "LIGHT";
}

function isMilitary(f){
  return f.type==="EUROFIGHTER"||f.type==="C130";
}

// ---------------- DIRECTION ----------------
function dir(f){
  if(f.rwy==="24"){
    if(f.route==="NOKAR"||f.route==="MARIO")return "R";
    return "L";
  }
  if(f.rwy==="06"){
    if(f.route==="NOKAR")return "L";
    if(f.route==="MARIO")return "S";
    return "R";
  }
  return "S";
}

// ---------------- VALIDATION ----------------
function valid(f){
  return validMap[f.rwy].includes(f.intersection)
  && !(f.intersection.startsWith("B") && !isMilitary(f));
}

// ---------------- COST MODEL (REALISTIC) ----------------
function cost(a,b){

  let c=0;

  const A=wake(a.type);
  const B=wake(b.type);

  const dA=dir(a);
  const dB=dir(b);

  // WAKE (realistic small impact)
  if(B==="LIGHT"&&A!=="LIGHT")c+=1;
  if(B==="MEDIUM"&&A==="HEAVY")c+=1;
  if(B==="HEAVY"&&A==="JUMBO")c+=1;
  if(B==="LIGHT"&&A==="JUMBO")c+=2;

  // DIRECTION SEPARATION
  if(dA===dB&&dA!=="S")c+=1;
  if(dA==="S"||dB==="S")c+=1;

  // INTERSECTION (primary driver but controlled)
  c+=base(a)+base(b);

  return c;
}

// ---------------- INTERSECTION COST ----------------
function base(f){
  let i=f.intersection;

  if(["A1","A2","A8","A9","B5"].includes(i))return 1;
  if(["A3","A4","A6","B1","B2","B4"].includes(i))return 2;

  return 1;
}

// ---------------- TOTAL ----------------
function total(arr){
  let s=0;
  for(let i=0;i<arr.length-1;i++){
    s+=cost(arr[i],arr[i+1]);
  }
  return s;
}

// ---------------- GREEDY ORDER ----------------
function greedy(arr){

  let r=[...arr];
  let out=[r.splice(0,1)[0]];

  while(r.length){

    let best=0,bestScore=9999;

    for(let i=0;i<r.length;i++){
      let s=cost(out[out.length-1],r[i]);
      if(s<bestScore){bestScore=s;best=i;}
    }

    out.push(r.splice(best,1)[0]);
  }

  return out;
}

// ---------------- OPTIMAL (VALID ONLY) ----------------
function optimal(arr){

  let order=greedy(arr);

  return order.map((f,i)=>{

    let best=f.intersection;
    let bestScore=9999;

    for(let i2=0;i2<validMap[f.rwy].length;i2++){

      let test={...f,intersection:validMap[f.rwy][i2]};

      if(!valid(test))continue;

      let s=0;
      if(order[i-1])s+=cost(order[i-1],test);
      if(order[i+1])s+=cost(test,order[i+1]);

      if(s<bestScore){
        bestScore=s;
        best=test.intersection;
      }
    }

    return {...f,intersection:best};
  });
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy=rand(runways);

  for(let i=0;i<6;i++){
    order.push({
      id:rand(airlines)+Math.floor(Math.random()*900),
      type:rand(types),
      rwy,
      route:rand(routes),
      intersection:validMap[rwy][0]
    });
  }

  render();
}

// ---------------- RENDER ----------------
function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    let ok=valid(f);

    const div=document.createElement("div");
    div.className="strip";

    div.style.borderColor=ok?"#444":"red";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "Type:"+f.type+" | RWY:"+f.rwy+"<br>"+
      "Route:"+f.route+"<br>"+
      "INT:"+f.intersection+
      (ok?"":" <span style='color:red'>(INVALID)</span>");

    const sel=document.createElement("select");

    validMap[f.rwy].forEach(x=>{
      let o=document.createElement("option");
      o.value=x;o.text=x;
      if(x===f.intersection)o.selected=true;
      sel.appendChild(o);
    });

    sel.onchange=e=>{
      order[i].intersection=e.target.value;
    };

    div.appendChild(sel);

    div.onclick=()=>{
      if(selected===null)selected=i;
      else{
        [order[selected],order[i]]=[order[i],order[selected]];
        selected=null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- EVALUATE ----------------
function evaluate(){

  let u=total(order);
  let o=total(optimal(order));

  result.innerText=
`RESULT

Your: ${u.toFixed(2)}
Optimal: ${o.toFixed(2)}
Diff: ${(u-o).toFixed(2)}`;
}

// ---------------- CHECK ----------------
function check(){

  result.innerText="calculating...";

  setTimeout(()=>{

    let opt=optimal(order);

    const list=document.getElementById("list");
    list.innerHTML="";

    order.forEach((f,i)=>{

      const div=document.createElement("div");
      div.className="strip";

      let ok=f.intersection===opt[i].intersection;

      div.style.borderColor=ok?"lime":"orange";

      div.innerHTML=
        "<b>"+f.id+"</b><br>"+
        "USER:"+f.intersection+" | OPT:"+opt[i].intersection;

      list.appendChild(div);
    });

    const title=document.createElement("div");
    title.innerHTML="<h3>OPTIMAL PLAN</h3>";
    list.appendChild(title);

    opt.forEach(f=>{
      const div=document.createElement("div");
      div.className="strip";
      div.style.borderColor="cyan";

      div.innerHTML=
        "<b>"+f.id+"</b><br>"+
        "INT:"+f.intersection;

      list.appendChild(div);
    });

    result.innerText+=`\n\nDONE`;

  },500);
}

</script>

</body>
</html>
