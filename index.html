<h1 style="color:red">TEST-VERSION 999</h1>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:700px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:grab;
  user-select:none;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.strip.dragging{
  opacity:0.5;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Departure Trainer</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let flights=[];

const types=["A320","B738","A321","E190","A388","EUROFIGHTER","GLEX","C56X"];
const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ"];

const runways=["06","24"];

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

function prk(){
  return "M"+(10+Math.floor(Math.random()*90));
}

function hdg(){
  return Math.floor(Math.random()*360);
}

function time(){
  let h=10+Math.floor(Math.random()*10);
  let m=Math.floor(Math.random()*60);
  return ""+h+(m<10?"0"+m:m);
}

function generate(){
  flights=[];
  let rwy=rand(runways);

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy:rwy,
      prk:prk(),
      hdg:hdg(),
      time:time()
    });
  }

  render();
}

function render(){

  const list=document.getElementById("list");
  list.innerHTML="";

  flights.forEach((f)=>{

    const div=document.createElement("div");
    div.className="strip";
    div.draggable=true;

    div.dataset.id = f.id;

    div.innerHTML=`
<div>${f.type}  ALT:0  Loc:</div>
<div>${f.id}  HDG:${f.hdg}  Prk:${f.prk}</div>
<div>${f.time}  GS:0  RWY:${f.rwy}  A9</div>
`;

    // DRAG START
    div.addEventListener("dragstart",(e)=>{
      div.classList.add("dragging");
      e.dataTransfer.setData("text/plain", div.dataset.id);
    });

    div.addEventListener("dragend",()=>{
      div.classList.remove("dragging");
    });

    list.appendChild(div);
  });

  // DROP ZONE LOGIC (FIXED)
  list.addEventListener("dragover",(e)=>{
    e.preventDefault();

    const dragging = document.querySelector(".dragging");
    const afterElement = getDragAfterElement(list, e.clientY);

    if(afterElement == null){
      list.appendChild(dragging);
    } else {
      list.insertBefore(dragging, afterElement);
    }
  });
}

function getDragAfterElement(container, y){
  const draggableElements = [...container.querySelectorAll(".strip:not(.dragging)")];

  return draggableElements.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if(offset < 0 && offset > closest.offset){
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function evaluate(){

  const nodes=[...document.querySelectorAll(".strip")];

  let order = nodes.map(n => n.dataset.id);

  document.getElementById("result").innerText=
`CHECK OK

Order:
${order.join(" → ")}
`;
}

</script>

</body>
</html>
