<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V4</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
  user-select:none;
  display:flex;
  flex-direction:column;
  gap:6px;
}

select{
  padding:5px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V4</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>
<button onclick="checkOrder()">Check Optimal</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order = [];
let selected = null;

// ---------------- DATA ----------------
const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types = ["A320","A321","B738","E190","A388","C130","GLEX","C56X","EUROFIGHTER"];
const runways = ["06","24"];
const routes = ["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

const intersections = ["A1","A2","A3","A4","A6","A8","A9","B1","B2","B4","B5"];

function rand(a){ return a[Math.floor(Math.random()*a.length)]; }

// ---------------- CLASS ----------------
function wake(t){
  if(t==="A388") return "JUMBO";
  if(t==="C130") return "HEAVY";
  if(["A320","A321","B738"].includes(t)) return "MEDIUM";
  return "LIGHT";
}

function isMilitary(f){
  return f.type==="EUROFIGHTER" || f.type==="C130";
}

function direction(f){
  if(f.rwy==="24"){
    if(f.route==="NOKAR"||f.route==="MARIO") return "R";
    return "L";
  }
  if(f.rwy==="06"){
    if(f.route==="NOKAR") return "L";
    if(f.route==="MARIO") return "S";
    return "R";
  }
  return "S";
}

// ---------------- INTERSECTION MODEL ----------------
function intInfo(f){
  if(f.rwy==="06"){
    if(["A1","A2"].includes(f.intersection)) return {base:1,type:"STD"};
    if(["A3","A4","B1","B2"].includes(f.intersection)) return {base:2,type:"INT"};
  }
  if(f.rwy==="24"){
    if(["A8","A9","B5"].includes(f.intersection)) return {base:1,type:"STD"};
    if(["A6","B4"].includes(f.intersection)) return {base:2,type:"INT"};
  }
  return {base:1,type:"STD"};
}

function valid(f){
  return !(f.intersection.startsWith("B") && !isMilitary(f));
}

// ---------------- COST MODEL ----------------
function cost(a,b){

  let c = 0;

  const A = wake(a.type);
  const B = wake(b.type);

  const dirA = direction(a);
  const dirB = direction(b);

  // WAKE (controlled)
  if(B==="LIGHT" && (A==="MEDIUM"||A==="HEAVY"||A==="JUMBO")) c += 1;
  if(B==="MEDIUM" && A==="HEAVY") c += 1;
  if(B==="HEAVY" && A==="JUMBO") c += 1;
  if((B==="LIGHT"||B==="MEDIUM") && A==="JUMBO") c += 2;

  // DIRECTION
  if(dirA === dirB && dirA !== "S") c += 1;
  if(dirA === "S") c += 1;
  if(dirB === "S") c += 1;

  // INTERSECTION (light but meaningful)
  c += intInfo(a).base;
  c += intInfo(b).base;

  if(intInfo(a).type==="INT") c += 0.5;
  if(intInfo(b).type==="INT") c += 0.5;

  // INVALID
  if(!valid(a)) c += 2;
  if(!valid(b)) c += 2;

  return c;
}

// ---------------- TOTAL ----------------
function total(arr){
  let s=0;
  for(let i=0;i<arr.length-1;i++){
    s += cost(arr[i],arr[i+1]);
  }
  return s;
}

// ---------------- GREEDY ORDER ----------------
function greedy(arr){

  let r=[...arr];
  let out=[r.splice(0,1)[0]];

  while(r.length){

    let best=0,score=9999;

    for(let i=0;i<r.length;i++){
      let c=cost(out[out.length-1],r[i]);
      if(c<score){score=c;best=i;}
    }

    out.push(r.splice(best,1)[0]);
  }

  return out;
}

// ---------------- BEST INTERSECTION ----------------
function bestIntersection(f,prev,next){

  let best=f.intersection;
  let bestScore=9999;

  for(let i=0;i<intersections.length;i++){

    let test={...f,intersection:intersections[i]};
    if(!valid(test)) continue;

    let s=0;
    if(prev) s+=cost(prev,test);
    if(next) s+=cost(test,next);

    if(s<bestScore){
      bestScore=s;
      best=intersections[i];
    }
  }

  return best;
}

// ---------------- OPTIMAL SOLUTION ----------------
function optimal(arr){

  let order=greedy(arr);

  return order.map((f,i)=>{
    let prev=order[i-1];
    let next=order[i+1];
    return {
      ...f,
      intersection:bestIntersection(f,prev,next)
    };
  });
}

// ---------------- GENERATE ----------------
function generate(){

  order=[];
  selected=null;

  let rwy=rand(runways);

  for(let i=0;i<6;i++){
    order.push({
      id:rand(airlines)+Math.floor(Math.random()*900),
      type:rand(types),
      rwy,
      route:rand(routes),
      intersection:"A1"
    });
  }

  render(order);
}

// ---------------- RENDER ----------------
function render(data){

  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    div.style.borderColor=valid(f)?"#444":"red";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "RWY:"+f.rwy+" | Route:"+f.route+"<br>"+
      "INT:"+f.intersection;

    div.onclick=()=>{
      if(selected===null){
        selected=i;
      }else{
        [order[selected],order[i]]=[order[i],order[selected]];
        selected=null;
        render(order);
      }
    };

    const sel=document.createElement("select");
    intersections.forEach(x=>{
      let o=document.createElement("option");
      o.value=x;o.text=x;
      if(f.intersection===x)o.selected=true;
      sel.appendChild(o);
    });

    sel.onchange=e=>{
      order[i].intersection=e.target.value;
    };

    div.appendChild(sel);
    list.appendChild(div);
  });
}

// ---------------- EVALUATE ----------------
function evaluate(){

  let user=total(order);
  let best=total(optimal(order));

  result.innerText=
`RESULT

Your cost: ${user.toFixed(2)}
Optimal: ${best.toFixed(2)}
Diff: ${(user-best).toFixed(2)}`;
}

// ---------------- CHECK ----------------
async function checkOrder(){

  result.innerText="calculating...";

  await new Promise(r=>setTimeout(r,500));

  let opt=optimal(order);

  const list=document.getElementById("list");
  list.innerHTML="";

  order.forEach((f,i)=>{

    const div=document.createElement("div");
    div.className="strip";

    let c=i<order.length-1?cost(order[i],order[i+1]):0;

    div.style.borderColor=(order[i].intersection===opt[i].intersection)?"lime":"orange";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "INT:"+f.intersection+" → OPT:"+opt[i].intersection+"<br>"+
      "Cost:"+c.toFixed(1);

    list.appendChild(div);
  });

  await new Promise(r=>setTimeout(r,300));

  const title=document.createElement("div");
  title.innerHTML="<h3>OPTIMAL FLOW</h3>";
  list.appendChild(title);

  opt.forEach(f=>{
    const div=document.createElement("div");
    div.className="strip";
    div.style.borderColor="cyan";

    div.innerHTML=
      "<b>"+f.id+"</b><br>"+
      "INT:"+f.intersection;

    list.appendChild(div);
  });
}

</script>

</body>
</html>
