<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer V11</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:900px;
}

.strip{
  background:#1e1e1e;
  border:2px solid #444;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}

select{
  margin-top:6px;
  padding:4px;
  background:#222;
  color:white;
  border:1px solid #555;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Trainer V11 – Instructor Mode</h2>

<button onclick="generate()">Generate</button>
<button onclick="check()">Check</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let order = [];
let selected = null;

const airlines=["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];
const types=["A320","A321","B738","E190","A388","B747","C17","A400M","GLEX","C56X","EUROFIGHTER"];
const runways=["06","24"];
const routes=["HAGEN","EGGIB","RONAL","NOKAR","MARIO"];

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

// ---------------- WAKE ----------------
function wake(t){
  if(t==="A388") return "JUMBO";
  if(["B747","C17","A400M"].includes(t)) return "HEAVY";
  return "MEDIUM";
}

// ---------------- DIRECTION ----------------
function dir(f){
  if(f.rwy==="24"){
    return (f.route==="NOKAR" || f.route==="MARIO") ? "R" : "L";
  }
  if(f.rwy==="06"){
    if(f.route==="NOKAR") return "L";
    if(f.route==="MARIO") return "S";
    return "R";
  }
  return "S";
}

// ---------------- INTERSECTION ----------------
function isIntersectionDeparture(f){
  if(f.rwy==="24"){
    return ["A6","B4"].includes(f.intersection);
  }
  if(f.rwy==="06"){
    return ["A3","A4","B1","B2"].includes(f.intersection);
  }
  return false;
}

// ---------------- ALLOWED INTERSECTIONS ----------------
function getAllowedIntersections(f){
  const bravoOnly = ["EUROFIGHTER","C17","A400M"].includes(f.type);
  const bothSides = ["A388","B747"].includes(f.type);

  if(f.rwy==="24"){
    if(bravoOnly) return ["B4","B5"];
    if(bothSides) return ["A9","A8","A6","B5","B4"];
    return ["A9","A8","A6"];
  }

  if(f.rwy==="06"){
    if(bravoOnly) return ["B1","B2"];
    if(bothSides) return ["A1","A2","A3","A4","B1","B2"];
    return ["A1","A2","A3","A4"];
  }

  return [];
}

// ---------------- COST ----------------
function cost(a,b){

  let wakeCost = 0;
  const A = wake(a.type);
  const B = wake(b.type);

  if(A==="HEAVY" && B==="MEDIUM") wakeCost = 2;
  if(A==="JUMBO" && B==="HEAVY") wakeCost = 2;
  if(A==="JUMBO" && B==="MEDIUM") wakeCost = 3;

  let routeCost = 0;

  if(dir(a) === dir(b)) routeCost = 2;

  if(a.rwy==="06" && a.route==="MARIO")
    routeCost = Math.max(routeCost,2);

  let base = Math.max(wakeCost, routeCost);

  let intersectionCost = 0;

  if(base > 0 && isIntersectionDeparture(b))
    intersectionCost = 1;

  return base + intersectionCost;
}

// ---------------- TOTAL ----------------
function total(arr){
  let t = 0;
  for(let i=0;i<arr.length-1;i++){
    t += cost(arr[i], arr[i+1]);
  }
  return t;
}

// ---------------- GENERATE ----------------
function generate(){

  order = [];
  selected = null;

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    let f = {
      id: rand(airlines)+Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy,
      route: rand(routes),
      intersection: ""
    };

    f.intersection = getAllowedIntersections(f)[0];
    order.push(f);
  }

  render();
}

// ---------------- EXPLANATION ----------------
function explainOrder(arr){

  let lines = [];

  for(let i=0;i<arr.length-1;i++){

    let a = arr[i];
    let b = arr[i+1];

    let wakeCost = 0;
    let routeCost = 0;
    let intersectionCost = 0;

    const A = wake(a.type);
    const B = wake(b.type);

    if(A==="HEAVY" && B==="MEDIUM") wakeCost = 2;
    if(A==="JUMBO" && B==="HEAVY") wakeCost = 2;
    if(A==="JUMBO" && B==="MEDIUM") wakeCost = 3;

    if(dir(a)===dir(b)) routeCost = 2;

    if(a.rwy==="06" && a.route==="MARIO")
      routeCost = Math.max(routeCost,2);

    let base = Math.max(wakeCost, routeCost);

    if(base>0 && isIntersectionDeparture(b))
      intersectionCost = 1;

    let totalSep = base + intersectionCost;

    let reasons = [];

    if(wakeCost) reasons.push(`Wake ${wakeCost}`);
    if(routeCost) reasons.push(`Route ${routeCost}`);
    if(intersectionCost) reasons.push(`Intersection +1`);

    if(reasons.length===0)
      reasons.push("No separation");

    lines.push(`${a.id} → ${b.id} = ${totalSep} min (${reasons.join(", ")})`);
  }

  return lines;
}

// ---------------- OPTIMIZE ----------------
function optimize(arr){

  let improved = true;

  while(improved){
    improved = false;

    for(let i=0;i<arr.length;i++){
      for(let j=i+1;j<arr.length;j++){

        let copy = [...arr];
        [copy[i], copy[j]] = [copy[j], copy[i]];

        if(total(copy) < total(arr)){
          arr = copy;
          improved = true;
        }
      }
    }
  }

  return arr;
}

// ---------------- RENDER ----------------
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f,i)=>{

    const div = document.createElement("div");
    div.className = "strip";

    div.innerHTML =
      `<b>${f.id}</b><br>
      RWY: ${f.rwy} | ${f.type}<br>
      Route: ${f.route}`;

    const sel = document.createElement("select");

    getAllowedIntersections(f).forEach(x=>{
      let o = document.createElement("option");
      o.value = x;
      o.text = x;
      if(x === f.intersection) o.selected = true;
      sel.appendChild(o);
    });

    sel.onchange = e=>{
      order[i].intersection = e.target.value;
      e.stopPropagation();
    };

    div.appendChild(sel);

    div.onclick = ()=>{
      if(selected === null) selected = i;
      else{
        [order[selected], order[i]] = [order[i], order[selected]];
        selected = null;
        render();
      }
    };

    list.appendChild(div);
  });
}

// ---------------- CHECK ----------------
function check(){

  let opt = optimize([...order]);

  const list = document.getElementById("list");
  list.innerHTML = "";

  order.forEach((f,i)=>{

    const div = document.createElement("div");
    div.className = "strip";

    div.innerHTML =
      `<b>${f.id}</b><br>
      USER INT: ${f.intersection}<br>
      OPT INT: ${opt[i].intersection}<br>
      TYPE: ${f.type} | RWY: ${f.rwy}`;

    list.appendChild(div);
  });

  list.appendChild(document.createElement("h3")).innerText = "OPTIMAL SEQUENCE";

  opt.forEach(f=>{
    const div = document.createElement("div");
    div.className = "strip";
    div.innerHTML = `<b>${f.id}</b><br>${f.type} | ${f.route} | ${f.intersection}`;
    list.appendChild(div);
  });

  document.getElementById("result").innerText =
`RESULT

Your cost: ${total(order)}
Optimal cost: ${total(opt)}
Difference: ${total(order)-total(opt)}

--- DETAIL ---
${explainOrder(opt).join("\n")}`;
}

</script>

</body>
</html>
