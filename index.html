<h1 style="color:red;">ATC TRAINER – VERSION 998</h1>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATC Trainer</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button{
  padding:10px;
  margin:10px 5px;
}

#list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-width:700px;
}

.strip{
  background:#1e1e1e;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;

  display:flex;
  flex-direction:column;
  gap:4px;

  user-select:none;
  touch-action:none;
}

.strip.dragging{
  opacity:0.4;
}

.result{
  margin-top:20px;
  white-space:pre-line;
}
</style>
</head>

<body>

<h2>ATC Departure Trainer</h2>

<button onclick="generate()">Generate</button>
<button onclick="evaluate()">Evaluate</button>

<div id="list"></div>
<div class="result" id="result"></div>

<script>

let flights = [];

const types = [
"A320","B738","A321","E190",
"A388","EUROFIGHTER","GLEX","C56X",
"A330","B777","B787"
];

const airlines = ["AUA","DLH","RYR","ETH","EZY","WZZ","KLM","AFR"];

const runways = ["06","24"];

let dragged = null;

function rand(a){
  return a[Math.floor(Math.random()*a.length)];
}

function prk(){
  return "M" + (10 + Math.floor(Math.random()*90));
}

function hdg(){
  return Math.floor(Math.random()*360);
}

function time(){
  let h = 10 + Math.floor(Math.random()*10);
  let m = Math.floor(Math.random()*60);
  return "" + h + (m < 10 ? "0"+m : m);
}

function generate(){

  flights = [];

  let rwy = rand(runways);

  for(let i=0;i<6;i++){
    flights.push({
      id: rand(airlines) + Math.floor(Math.random()*900),
      type: rand(types),
      rwy: rwy,
      prk: prk(),
      hdg: hdg(),
      time: time()
    });
  }

  render();
}

function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  flights.forEach(f => {

    const div = document.createElement("div");
    div.className = "strip";
    div.draggable = true;
    div.dataset.id = f.id;

    div.innerHTML = `
${f.type}  ALT:0  Loc:
${f.id}  HDG:${f.hdg}  Prk:${f.prk}
${f.time}  GS:0  RWY:${f.rwy}  A9
`;

    div.addEventListener("dragstart", e => {
      dragged = div;
      div.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });

    div.addEventListener("dragend", () => {
      div.classList.remove("dragging");
      dragged = null;
    });

    div.addEventListener("dragover", e => {
      e.preventDefault();
    });

    div.addEventListener("drop", e => {
      e.preventDefault();

      if(dragged && dragged !== div){
        const list = document.getElementById("list");

        const nodes = [...list.children];
        const a = nodes.indexOf(dragged);
        const b = nodes.indexOf(div);

        if(a < b){
          list.insertBefore(dragged, div.nextSibling);
        } else {
          list.insertBefore(dragged, div);
        }
      }
    });

    list.appendChild(div);
  });
}

function evaluate(){

  const nodes = [...document.querySelectorAll(".strip")];

  const order = nodes.map(n => n.dataset.id);

  document.getElementById("result").innerText =
`CHECK COMPLETE

Order:
${order.join(" → ")}`;
}

</script>

</body>
</html>
